name: Release Binaries

# Build cross-platform binaries and attach them to a GitHub Release.
# Driven two ways, both PAT-free:
#   1. Automatically by release-please.yml (calls this via `workflow_call` once a
#      release + tag have been created in the same workflow run).
#   2. Manually via `workflow_dispatch` against an existing tag (recovery).
#
# Binaries are the DEFAULT (keyword) build — lean and fully portable (no
# ONNX/ort). Semantic search stays an opt-in source build
# (`cargo install --features semantic`).

on:
  workflow_call:
    inputs:
      tag:
        description: "Tag to build and upload binaries for (e.g. v0.1.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build/upload binaries for (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,       target: aarch64-apple-darwin }
          - { os: macos-13,       target: x86_64-apple-darwin }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl, musl: true }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install musl tools
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --release --locked -p wend-cli --target ${{ matrix.target }}
      - name: Verify musl binary is static
        if: matrix.musl
        run: |
          file target/${{ matrix.target }}/release/wend
          ldd target/${{ matrix.target }}/release/wend 2>&1 | grep -q "not a dynamic executable" \
            && echo "OK: static" || (echo "FAIL: not static" && exit 1)
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "$GITHUB_WORKSPACE/wend-${{ matrix.target }}.tar.gz" wend
          cd "$GITHUB_WORKSPACE"
          shasum -a 256 "wend-${{ matrix.target }}.tar.gz" > "wend-${{ matrix.target }}.tar.gz.sha256"
      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a "$env:GITHUB_WORKSPACE/wend-${{ matrix.target }}.zip" wend.exe
          cd "$env:GITHUB_WORKSPACE"
          (Get-FileHash "wend-${{ matrix.target }}.zip" -Algorithm SHA256).Hash > "wend-${{ matrix.target }}.zip.sha256"
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            wend-${{ matrix.target }}.tar.gz
            wend-${{ matrix.target }}.tar.gz.sha256
            wend-${{ matrix.target }}.zip
            wend-${{ matrix.target }}.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
