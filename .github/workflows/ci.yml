name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        # NOTE: do NOT use --all-features (the `fast-embed`/ort path is non-portable).
        run: cargo test --workspace

  musl-smoke:
    name: musl static smoke-build (bundled C core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: build core (no semantic) for musl
        run: cargo build -p wend-cli --target x86_64-unknown-linux-musl
      - name: assert static binary
        run: |
          BIN=target/x86_64-unknown-linux-musl/debug/wend
          file "$BIN"
          # musl links statically; modern Rust emits a static-PIE, so `ldd` no
          # longer prints "not a dynamic executable". Assert on `file`'s linkage
          # (accepts both classic static and static-pie) instead.
          if file "$BIN" | grep -qE 'static-pie linked|statically linked'; then
            echo "OK: static"
          else
            echo "FAIL: not static"; exit 1
          fi
