name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        # NOTE: do NOT use --all-features (the `fast-embed`/ort path is non-portable).
        run: cargo test --workspace

  musl-smoke:
    name: musl static smoke-build (bundled C core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: build core (no semantic) for musl
        run: cargo build -p recall-cli --target x86_64-unknown-linux-musl
      - name: assert static binary
        run: |
          file target/x86_64-unknown-linux-musl/debug/recall
          ldd target/x86_64-unknown-linux-musl/debug/recall 2>&1 | grep -q "not a dynamic executable" \
            && echo "OK: static" || (echo "FAIL: not static" && exit 1)
